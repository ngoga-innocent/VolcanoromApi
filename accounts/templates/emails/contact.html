<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Contact Message</title>
</head>

<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0" style="background:white;border-radius:8px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.1);">

<!-- Header -->
<tr>
<td style="background:#2563eb;color:white;padding:25px;text-align:center;font-size:22px;font-weight:bold;">
Volcanorom Support
</td>
</tr>

<!-- Content -->
<tr>
<td style="padding:30px;color:#333;">

<h2 style="margin-top:0;">New Contact Message</h2>

<p>A new message has been submitted from the Volcanorom website contact form.</p>

<table width="100%" cellpadding="10" style="border-collapse:collapse;margin-top:20px;">

<tr style="background:#f8fafc;">
<td style="font-weight:bold;">Name</td>
<td>{{ name }}</td>
</tr>

<tr>
<td style="font-weight:bold;">Email</td>
<td>{{ email }}</td>
</tr>

<tr style="background:#f8fafc;">
<td style="font-weight:bold;">Subject</td>
<td>{{ subject }}</td>
</tr>

<tr>
<td style="font-weight:bold;">Message</td>
<td>{{ message }}</td>
</tr>

</table>

</td>
</tr>

<!-- Footer -->
<tr>
<td style="background:#fafafa;text-align:center;padding:20px;font-size:12px;color:#777;">

<p>This email was generated from the Volcanorom contact form.</p>

<p>© 2026 Volcanorom</p>

</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
