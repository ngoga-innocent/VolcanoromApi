<!DOCTYPE html>
<html>
<head>

<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0" style="background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.1);">

<!-- Header -->
<tr>
<td style="background:#2563eb;color:white;padding:25px;text-align:center;font-size:22px;font-weight:bold;">
Volcanorom Verification
</td>
</tr>

<!-- Content -->
<tr>
<td style="padding:40px;text-align:center;color:#333;">

<h2>Hello {{ username }},</h2>

Your verification code is:
</p>

<div style="margin:30px 0;font-size:36px;font-weight:bold;letter-spacing:8px;color:#2563eb;">
{{ otp }}
</div>

<p style="color:#666;">
This code will expire in <strong>10 minutes</strong>.
</p>

<p style="margin-top:30px;color:#999;font-size:13px;">
If you did not request this code, please ignore this email.
</p>

</td>
</tr>

<!-- Footer -->
<tr>
<td style="background:#fafafa;text-align:center;padding:20px;font-size:12px;color:#777;">

<p>© 2026 Volcanorom. All rights reserved.</p>

</td>
</tr>

</table>

</td>
</tr>
</table>
